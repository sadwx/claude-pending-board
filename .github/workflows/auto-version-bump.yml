name: Auto-bump plugin version

# Appends the short commit SHA to `plugin/.claude-plugin/plugin.json`'s
# `version` field on every push to main, then commits and pushes the
# update so `claude plugin update` always sees a new version and pulls
# the latest. The base version (before `+sha.…`) is read from the
# workspace `Cargo.toml`.
#
# Why: Claude Code only delivers updates when the manifest's `version`
# field changes. Omitting `version` entirely uses the commit SHA
# internally, but the SHA isn't surfaced to users via `claude plugin
# list`. By writing `<base>+sha.<short-sha>` we get both: every commit
# is a new version AND the SHA is visible in the plugin manager UI.
#
# Loop safety: pushes made with `secrets.GITHUB_TOKEN` do NOT trigger
# new workflow runs (per GitHub Actions docs), so the auto-commit this
# workflow makes won't re-trigger itself.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute new plugin version
        id: ver
        run: |
          # Extract base version from [workspace.package] in Cargo.toml.
          base=$(awk '
            /^\[workspace.package\]/ { in_wp = 1; next }
            /^\[/ { in_wp = 0 }
            in_wp && /^version = / {
              gsub(/version = "/, "")
              gsub(/"/, "")
              print
              exit
            }
          ' Cargo.toml)
          if [ -z "$base" ]; then
            echo "::error::could not extract workspace version from Cargo.toml"
            exit 1
          fi
          sha=$(git rev-parse --short HEAD)
          new_ver="${base}+sha.${sha}"
          echo "Computed plugin version: $new_ver"
          echo "new_version=$new_ver" >> "$GITHUB_OUTPUT"

      - name: Update plugin.json
        run: |
          jq --arg v "${{ steps.ver.outputs.new_version }}" '.version = $v' \
            plugin/.claude-plugin/plugin.json > plugin/.claude-plugin/plugin.json.tmp
          mv plugin/.claude-plugin/plugin.json.tmp plugin/.claude-plugin/plugin.json

      - name: Commit and push (if changed)
        run: |
          if git diff --quiet plugin/.claude-plugin/plugin.json; then
            echo "Plugin version already up-to-date for $(git rev-parse --short HEAD); nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugin/.claude-plugin/plugin.json
          git commit -m "chore(plugin): bump version to ${{ steps.ver.outputs.new_version }}"
          git push
