name: Release

# Temporarily disabled: GitHub Actions billing block. Run manually via
# the Actions tab (`workflow_dispatch`) when cutting a release, or
# restore the tag-push trigger below when billing is sorted.
#
# on:
#   push:
#     tags:
#       - "v*"
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v0.3.0)"
        required: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/app
          tagName: ${{ inputs.tag }}
          releaseName: "Claude Pending Board ${{ inputs.tag }}"
          releaseBody: "See the release notes below and [docs/release-checklist.md](https://github.com/sadwx/claude-pending-board/blob/main/docs/release-checklist.md) for the manual verification steps."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
